services:
  postgres:
    image: postgres:16-alpine
    container_name: momentum-db
    environment:
      POSTGRES_DB: momentum
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: momentum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momentum -d momentum"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: momentum-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://momentum:momentum@postgres:5432/momentum
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: momentum-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
